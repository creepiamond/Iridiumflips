<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <title>VAULT | CREEPIAMOND</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FFFDF5; color: #4A4540; overflow-x: hidden; }
        
        /* Neon White Light Font */
        .neon-white { 
            color: white;
            text-shadow: 0 0 5px rgba(255,255,255,1), 0 0 10px rgba(255,255,255,0.5), 0 0 2px rgba(0,0,0,0.2); 
        }
        
        .luxury-box {
            background: #FFFFFF;
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 10px 30px rgba(255, 159, 102, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .luxury-box:hover {
            border-color: rgba(16, 185, 129, 1);
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.1);
            transform: translateY(-3px);
        }

        .btn-modern {
            border: 1px solid #FF9F66;
            background: transparent;
            color: #FF9F66;
            transition: all 0.3s ease;
        }

        .btn-modern:hover {
            background: #FF9F66;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 159, 102, 0.3);
        }

        .square-input {
            background: #FFFFFF;
            border: 1px solid #E5E1DA;
            letter-spacing: 1em;
            text-indent: 1em;
            color: #4A4540;
        }

        .square-input:focus { border-color: #FF9F66; outline: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="fixed top-8 w-full text-center z-50">
        <p class="text-[10px] tracking-[0.8em] uppercase text-stone-400 font-light">Flips by creepiamond</p>
    </div>

    <div id="gate" class="text-center w-full max-w-sm">
        <h1 class="text-2xl tracking-[0.4em] mb-12 font-light uppercase text-stone-800">Authentication</h1>
        <p class="text-[10px] text-stone-400 mb-6 uppercase tracking-widest">Please type the flipcode for secured flips</p>
        <input type="password" id="flipcode" maxlength="4" placeholder="••••" 
               class="square-input w-full py-4 text-center text-xl mb-6">
        <button onclick="checkCode()" class="btn-modern w-full py-4 text-[10px] uppercase tracking-[0.4em]">Authorize</button>
        <p id="error-msg" class="text-rose-500 text-[10px] mt-4 uppercase tracking-widest opacity-0 transition-opacity">Access Denied</p>
    </div>

    <div id="menu" class="hidden w-full max-w-2xl animate-in fade-in duration-700">
        <div class="grid gap-6">
            <button onclick="showFlips('crafting')" class="btn-modern p-10 text-left flex justify-between items-center group bg-white">
                <span class="text-lg font-light tracking-widest">CRAFTING</span>
                <span class="opacity-40 group-hover:opacity-100 group-hover:text-white transition-opacity">SELECT</span>
            </button>
            <button onclick="showFlips('combining')" class="btn-modern p-10 text-left flex justify-between items-center group bg-white">
                <span class="text-lg font-light tracking-widest">COMBINING</span>
                <span class="opacity-40 group-hover:opacity-100 group-hover:text-white transition-opacity">SELECT</span>
            </button>
            <button onclick="showFlips('bz')" class="btn-modern p-10 text-left flex justify-between items-center group bg-white">
                <span class="text-lg font-light tracking-widest">BUY/SELL FLIPS</span>
                <span class="opacity-40 group-hover:opacity-100 group-hover:text-white transition-opacity">SELECT</span>
            </button>
        </div>
    </div>

    <div id="vault" class="hidden w-full max-w-6xl">
        <div class="flex justify-between items-center mb-12">
            <button onclick="backToMenu()" class="text-[10px] tracking-widest text-emerald-600 hover:text-emerald-400 uppercase">← Back to Strategies</button>
        </div>
        <div id="dashboard" class="grid grid-cols-1 gap-8"></div>
    </div>

    <script>
        const SECRET_CODE = "1988";

        const flipData = {
            crafting: {
                title: "buy order 8x Alligator skin from BZ and craft quick bite 1 enchanted book or type /recipe quick bite for fast crafting then sell into bazaar",
                items: [{ id: 'ENCHANTED_BOOK:QUICK_BITE:1', name: 'Quick Bite 1' }]
            },
            combining: {
                title: "Buy order charm tier 1 books from bazaar and combine into tier 5 then sell order 16x t1 book = 1x t5 book",
                items: [{ id: 'ENCHANTED_BOOK:CHARM:1', name: 'Charm 1' }]
            },
            bz: {
                title: "Real-time spread analysis for standard high-volume items",
                items: [
                    { id: 'ENCHANTED_RAW_RABBIT', name: 'Enchanted Raw Rabbit' },
                    { id: 'HALF_EATEN_MUSHROOM', name: 'Half-eaten mushroom' },
                    { id: 'FINE_FLOUR', name: 'Fine flour' },
                    { id: 'ENCHANTED_PORK', name: 'Enchanted Raw Pork' },
                    { id: 'TUNGSTEN_KEY', name: 'Tungsten Key' },
                    { id: 'UMBER_KEY', name: 'Umber Key' },
                    { id: 'ENCHANTMENT_THUNDERBOLT_7', name: 'Thunderbolt 7' },
                    { id: 'ENCHANTMENT_THUNDERLORD_7', name: 'Thunderlord 7' },
                    { id: 'ENCHANTMENT_FIRE_PROTECTION_7', name: 'Fire Protection 7' },
                    { id: 'KADA_LEAD', name: 'Kada Lead' }
                ]
            }
        };

        function checkCode() {
            const input = document.getElementById('flipcode').value;
            const error = document.getElementById('error-msg');
            if (input === SECRET_CODE) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('menu').classList.remove('hidden');
            } else {
                error.classList.remove('opacity-0');
                setTimeout(() => error.classList.add('opacity-0'), 2000);
                document.getElementById('flipcode').value = '';
            }
        }

        async function showFlips(cat) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('vault').classList.remove('hidden');
            
            const container = document.getElementById('dashboard');
            container.innerHTML = '<div class="text-center py-20 tracking-[1em] text-xs animate-pulse text-stone-400">LOADING DATA...</div>';

            try {
                const res = await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
                const data = await res.json();
                container.innerHTML = '';

                // Strategy Title Box
                container.innerHTML += `
                    <div class="luxury-box p-8 mb-4 border-l-4 border-l-emerald-500 rounded-none">
                        <p class="text-xs tracking-widest text-emerald-600 font-bold uppercase mb-2">Strategy</p>
                        <p class="text-sm font-light leading-relaxed text-stone-600">${flipData[cat].title}</p>
                    </div>`;

                const itemsGrid = document.createElement('div');
                itemsGrid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4";
                
                flipData[cat].items.forEach(item => {
                const product = data.products[item.id];
                const stats = product?.quick_status;

                if (stats) {
                const buyPrice = Math.floor(stats.buyPrice);
                const sellPrice = Math.floor(stats.sellPrice);
                const spread = buyPrice - sellPrice;
                const weeklyBuy = stats.buyMovingWeek || 0;
                const weeklySell = stats.sellMovingWeek || 0;
                const spreadColor = spread >= 0 ? "text-emerald-600" : "text-red-500";
                const spreadSymbol = spread >= 0 ? "+" : "";
                        itemsGrid.innerHTML += `
                            <div class="luxury-box p-8 flex flex-col justify-between min-h-[220px] rounded-none">
                                <h2 class="neon-white text-[11px] tracking-[0.2em] uppercase mb-6 bg-stone-800 py-2 px-3 inline-block w-fit">${item.name}</h2>
                                <div class="space-y-4">
                                    <div class="flex justify-between items-center text-[10px] border-b border-stone-100 pb-2">
                                        <span class="text-stone-400 uppercase">Buy Order Price</span>
                                        <span class="font-semibold">${buyPrice.toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center text-[10px] border-b border-stone-100 pb-2">
                                        <span class="text-stone-400 uppercase">Sell Order Price</span>
                                        <span class="font-semibold">${sellPrice.toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center text-[10px] border-b border-stone-100 pb-2">
    <span class="text-stone-400 uppercase">Weekly Insta Buy</span>
    <span class="font-semibold">${Math.floor(weeklyBuy).toLocaleString()}</span>
</div>
<div class="flex justify-between items-center text-[10px] border-b border-stone-100 pb-2">
    <span class="text-stone-400 uppercase">Weekly Insta Sell</span>
    <span class="font-semibold">${Math.floor(weeklySell).toLocaleString()}</span>
</div>
                                    <div class="pt-4 flex justify-between items-baseline">
<span class="text-[9px] text-emerald-600 font-bold tracking-tighter uppercase">PROFIT PER ITEM</span>
                                       <span class="text-2xl font-light tracking-tighter ${spreadColor}">
    ${spreadSymbol}${spread.toLocaleString()}
</span>
</span>
                                        </span>
                                    </div>
                                </div>
                            </div>`;
                    }
                });
                container.appendChild(itemsGrid);
            } catch (e) { container.innerHTML = "API OFFLINE"; }
        }

        function backToMenu() {
            document.getElementById('vault').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
        }
    </script>
</body>
</html>
