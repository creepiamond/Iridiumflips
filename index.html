<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&family=JetBrains+Mono:wght@100;400&display=swap" rel="stylesheet">
    <title>VAULT</title>
    <style>
        :root {
            --bg: #fdfcf9;
            --text: #1a1a1a;
            --border: rgba(0,0,0,0.08);
            --accent: #FF9F66;
            --glow: rgba(255, 159, 102, 0.2);
        }

        .dark {
            --bg: #0a0a0a;
            --text: #e5e5e5;
            --border: rgba(255,255,255,0.08);
            --accent: #FF9F66;
            --glow: rgba(255, 159, 102, 0.4);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        /* High-End Detail: The Grid Background */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            z-index: -1;
        }

        /* Glass Cards */
        .v-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .v-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--glow);
        }

        /* Cleanest Buttons */
        .v-btn {
            border: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-size: 10px;
            transition: all 0.2s ease;
            background: transparent;
        }

        .v-btn:hover {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
        }

        /* Input Styling */
        .v-input {
            background: transparent;
            border: 1px solid var(--border);
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
        }

        .v-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--glow);
        }

        /* Theme Toggle Pulse */
        .theme-toggle {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .loading-bar {
            height: 1px;
            background: var(--accent);
            width: 0%;
            transition: width 1s ease;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="grid-bg"></div>

    <div class="fixed top-8 right-8 flex items-center gap-4 z-[100]">
        <div class="theme-toggle hover:bg-stone-200 dark:hover:bg-stone-800" onclick="toggleTheme()">
            <div class="w-2 h-2 rounded-full bg-orange-400"></div>
        </div>
    </div>

    <div class="fixed top-8 left-8">
        <p class="text-[9px] tracking-[0.6em] uppercase opacity-40 font-semibold">FLIPS BY CREEPIAMOND</p>
    </div>

    <div id="gate" class="w-full max-w-[320px] text-center">
        <h1 class="text-xs tracking-[0.8em] uppercase mb-16 opacity-80">Authentication</h1>
        <input type="password" id="flipcode" maxlength="4" placeholder="0000" 
               onkeydown="if(event.key==='Enter') checkCode()" 
               class="v-input w-full py-5 text-xl mb-4">
        <button onclick="checkCode()" class="v-btn w-full py-4 font-bold">Authorize Access</button>
        <p id="error-msg" class="text-[9px] text-rose-500 mt-6 uppercase tracking-widest opacity-0 transition-opacity">Key Error</p>
    </div>

    <div id="menu" class="hidden w-full max-w-2xl grid gap-4">
        <button onclick="showFlips('crafting')" class="v-card p-10 text-left flex justify-between items-center group">
            <span class="text-xs tracking-[0.4em] font-light">CRAFTING</span>
            <span class="mono text-[10px] opacity-30 group-hover:opacity-100 transition-opacity">→ 01</span>
        </button>
        <button onclick="showFlips('combining')" class="v-card p-10 text-left flex justify-between items-center group">
            <span class="text-xs tracking-[0.4em] font-light">COMBINING</span>
            <span class="mono text-[10px] opacity-30 group-hover:opacity-100 transition-opacity">→ 02</span>
        </button>
        <button onclick="showFlips('bz')" class="v-card p-10 text-left flex justify-between items-center group">
            <span class="text-xs tracking-[0.4em] font-light">MARKET FLIPS</span>
            <span class="mono text-[10px] opacity-30 group-hover:opacity-100 transition-opacity">→ 03</span>
        </button>
    </div>

    <div id="vault" class="hidden w-full max-w-7xl animate-in fade-in duration-500">
        <div class="flex justify-between items-center mb-12">
            <button onclick="backToMenu()" class="v-btn px-6 py-2">Back</button>
            <div id="status" class="mono text-[9px] uppercase tracking-widest opacity-50">API.Status: Live</div>
        </div>
        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
    </div>

    <script>
        const SECRET_CODE = "3335";

        function toggleTheme() {
            document.body.classList.toggle('dark');
        }

        function checkCode() {
            const input = document.getElementById('flipcode').value;
            if (input === SECRET_CODE) {
                document.getElementById('gate').classList.add('hidden');
                document.getElementById('menu').classList.remove('hidden');
            } else {
                const err = document.getElementById('error-msg');
                err.classList.remove('opacity-0');
                setTimeout(() => err.classList.add('opacity-0'), 2000);
            }
        }

        async function showFlips(cat) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('vault').classList.remove('hidden');
            const container = document.getElementById('dashboard');
            container.innerHTML = '<div class="col-span-full py-20 text-center mono text-[10px] tracking-[1em] opacity-40">FETCHING DATA...</div>';

            try {
                const res = await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
                const data = await res.json();
                container.innerHTML = '';

                // Add Strategy Header
                const flipData = {
                    crafting: { title: "CRAFT FLIPS", items: [{ id: 'ENCHANTED_BOOK:QUICK_BITE:1', name: 'Quick Bite 1' }] },
                    combining: { title: "COMBINE FLIPS", items: [{ id: 'ENCHANTMENT_CHARM_1', name: 'Charm 1' },{ id: 'ENCHANTMENT_PROSPERITY_1', name: 'Prosperity 1' }] },
                    bz: { title: "MARKET SPREAD", items: [{ id: 'ENCHANTED_RAW_RABBIT', name: 'Enchanted Rabbit' },{ id: 'TUNGSTEN_KEY', name: 'Tungsten Key' }, { id: 'ENCHANTED_TUNGSTEN', name: 'Ench. Tungsten' }] }
                    // Add other items here...
                };

                flipData[cat].items.forEach(item => {
                    const stats = data.products[item.id]?.quick_status;
                    if (stats) {
                        const buy = Math.floor(stats.buyPrice);
                        const sell = Math.floor(stats.sellPrice);
                        const profit = buy - sell;
                        
                        container.innerHTML += `
                            <div class="v-card p-6 flex flex-col justify-between min-h-[220px]">
                                <div class="flex justify-between items-start">
                                    <div class="w-10 h-10 border border-stone-200 dark:border-stone-800 p-2">
                                        <img src="https://sky.shiiyu.moe/item/${item.id}" 
                                             onerror="this.src='https://mc-heads.net/item/${item.id.toLowerCase()}';" 
                                             class="w-full h-full object-contain">
                                    </div>
                                    <div class="text-right mono text-[8px] opacity-40">
                                        VOL: ${Math.floor(stats.buyMovingWeek/1000)}K
                                    </div>
                                </div>
                                
                                <div class="mt-4">
                                    <h2 class="text-[10px] tracking-widest font-semibold uppercase mb-6 truncate">${item.name}</h2>
                                    <div class="space-y-2 mono text-[9px]">
                                        <div class="flex justify-between border-b border-stone-100 dark:border-stone-900 pb-1">
                                            <span class="opacity-40">BUY</span>
                                            <span>${buy.toLocaleString()}</span>
                                        </div>
                                        <div class="flex justify-between border-b border-stone-100 dark:border-stone-900 pb-1">
                                            <span class="opacity-40">SELL</span>
                                            <span>${sell.toLocaleString()}</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="mt-6 flex justify-between items-baseline">
                                    <span class="text-[8px] opacity-30">PROFIT</span>
                                    <span class="text-sm font-bold ${profit > 0 ? 'text-emerald-500' : 'text-rose-500'}">
                                        ${profit.toLocaleString()}
                                    </span>
                                </div>
                            </div>`;
                    }
                });

            } catch (e) {
                container.innerHTML = '<div class="col-span-full py-20 text-center mono text-rose-500 text-[10px]">SYNC_ERROR</div>';
            }
        }

        function backToMenu() {
            document.getElementById('vault').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
        }
    </script>
</body>
</html>
