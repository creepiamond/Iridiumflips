<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>BZ VAULT | CATEGORIES</title>
</head>
<body class="bg-[#fafafa] text-[#1a1a1a] p-10 font-sans flex flex-col items-center justify-center min-h-screen">

    <div id="gate" class="text-center">
        <h1 class="text-xl font-light tracking-[0.2em] text-stone-400 mb-8 uppercase">Authentication</h1>
        <input type="password" id="flipcode" placeholder="ENTER FLIPCODE" 
               class="bg-transparent border-b border-stone-300 py-2 px-4 text-center outline-none focus:border-stone-900 transition-all">
        <button onclick="checkCode()" class="block mt-8 mx-auto text-xs tracking-widest text-stone-500 hover:text-stone-900 uppercase">Access Vault</button>
    </div>

    <div id="category-menu" class="hidden text-center w-full max-w-xl">
        <h1 class="text-2xl font-light mb-12 tracking-tighter text-stone-900">SELECT <span class="font-bold text-stone-500">STRATEGY</span></h1>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="showFlips('crafting')" class="p-6 border border-stone-200 bg-white hover:border-stone-900 transition-all text-left flex justify-between items-center group">
                <span class="font-medium">1. Crafting Flips</span>
                <span class="text-stone-300 group-hover:text-stone-900">→</span>
            </button>
            <button onclick="showFlips('combining')" class="p-6 border border-stone-200 bg-white hover:border-stone-900 transition-all text-left flex justify-between items-center group">
                <span class="font-medium">2. Combining Flips</span>
                <span class="text-stone-300 group-hover:text-stone-900">→</span>
            </button>
            <button onclick="showFlips('bz')" class="p-6 border border-stone-200 bg-white hover:border-stone-900 transition-all text-left flex justify-between items-center group">
                <span class="font-medium">3. BZ Flips</span>
                <span class="text-stone-300 group-hover:text-stone-900">→</span>
            </button>
        </div>
    </div>

    <div id="vault" class="hidden w-full max-w-4xl">
        <button onclick="backToMenu()" class="text-[10px] uppercase tracking-widest text-stone-400 mb-8 hover:text-stone-900">← Back to Menu</button>
        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <script>
        const SECRET_CODE = "GOLDEN_FLIP"; // Your password
        
        // Organized categories
        const flipData = {
            crafting: [
                { id: 'ENCHANTED_IRON_INGOT', name: 'Enchanted Iron' },
                { id: 'ENCHANTED_DIAMOND', name: 'Enchanted Diamond' }
            ],
            combining: [
                { id: 'RECOMBOBULATOR_3000', name: 'Recombobulator' }
            ],
            bz: [
                { id: 'BOOSTER_COOKIE', name: 'Booster Cookie' },
                { id: 'STOCK_OF_STONKS', name: 'Stock of Stonks' }
            ]
        };

        function checkCode() {
            const input = document.getElementById('flipcode').value;
            if (input === SECRET_CODE) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('category-menu').classList.remove('hidden');
            }
        }

        async function showFlips(category) {
            document.getElementById('category-menu').classList.add('hidden');
            document.getElementById('vault').classList.remove('hidden');
            
            const res = await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
            const data = await res.json();
            const container = document.getElementById('dashboard');
            container.innerHTML = ''; 

            flipData[category].forEach(item => {
                const stats = data.products[item.id].quick_status;
                const profit = Math.floor(stats.sellPrice - stats.buyPrice);
                
                container.innerHTML += `
                    <div class="bg-white border border-stone-200 p-8 rounded-sm shadow-sm">
                        <h2 class="text-lg font-medium text-stone-800">${item.name}</h2>
                        <div class="mt-8 flex justify-between items-end">
                            <span class="text-stone-400 text-[10px] uppercase tracking-widest">Est. Profit</span>
                            <span class="text-xl font-light ${profit > 0 ? 'text-emerald-600' : 'text-rose-600'}">
                                +${profit.toLocaleString()}
                            </span>
                        </div>
                    </div>
                `;
            });
        }

        function backToMenu() {
            document.getElementById('vault').classList.add('hidden');
            document.getElementById('category-menu').classList.remove('hidden');
        }
    </script>
</body>
</html>
