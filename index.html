<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>BZ VAULT | SECURE</title>
</head>
<body class="bg-[#fafafa] text-[#1a1a1a] font-sans flex items-center justify-center min-h-screen">

    <div id="gate" class="text-center p-8 w-full max-w-md">
        <h1 class="text-xl font-light tracking-[0.3em] text-stone-400 mb-12 uppercase italic">The Vault</h1>
        <div class="space-y-6">
            <input type="password" id="flipcode" placeholder="ENTER FLIPCODE" 
                   class="w-full bg-transparent border-b border-stone-200 py-3 text-center outline-none focus:border-stone-900 transition-all placeholder:text-stone-300">
            
            <button onclick="checkCode()" 
                    class="w-full py-4 text-[10px] tracking-[0.2em] font-semibold text-stone-400 hover:text-stone-900 border border-stone-100 hover:border-stone-900 transition-all uppercase">
                Authorize Access
            </button>
            
            <p id="error-msg" class="text-rose-400 text-[10px] uppercase tracking-widest opacity-0 transition-opacity">Access Denied: Invalid Code</p>
        </div>
    </div>

    <div id="category-menu" class="hidden text-center w-full max-w-xl animate-in fade-in duration-700">
        <h1 class="text-2xl font-light mb-12 tracking-tight text-stone-900">SELECT <span class="font-bold text-stone-400 italic">STRATEGY</span></h1>
        <div class="grid grid-cols-1 gap-4 px-6">
            <button onclick="showFlips('crafting')" class="p-8 border border-stone-100 bg-white hover:border-stone-900 transition-all text-left flex justify-between items-center group shadow-sm">
                <span class="font-medium tracking-tight text-stone-700">1. Crafting Flips</span>
                <span class="text-stone-300 group-hover:text-stone-900 translate-x-0 group-hover:translate-x-2 transition-transform">→</span>
            </button>
            <button onclick="showFlips('combining')" class="p-8 border border-stone-100 bg-white hover:border-stone-900 transition-all text-left flex justify-between items-center group shadow-sm">
                <span class="font-medium tracking-tight text-stone-700">2. Combining Flips</span>
                <span class="text-stone-300 group-hover:text-stone-900 translate-x-0 group-hover:translate-x-2 transition-transform">→</span>
            </button>
            <button onclick="showFlips('bz')" class="p-8 border border-stone-100 bg-white hover:border-stone-900 transition-all text-left flex justify-between items-center group shadow-sm">
                <span class="font-medium tracking-tight text-stone-700">3. BZ Flips</span>
                <span class="text-stone-300 group-hover:text-stone-900 translate-x-0 group-hover:translate-x-2 transition-transform">→</span>
            </button>
        </div>
    </div>

    <div id="vault" class="hidden w-full max-w-5xl px-10">
        <div class="flex justify-between items-center mb-12">
            <button onclick="backToMenu()" class="text-[9px] uppercase tracking-[0.2em] text-stone-400 hover:text-stone-900 transition-colors">← Return to Strategies</button>
            <span class="text-[9px] uppercase tracking-[0.2em] text-stone-300">Market Sync: Active</span>
        </div>
        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        const SECRET_CODE = "GOLDEN_FLIP"; // Change this whenever you want
        
        const flipData = {
            crafting: [
                { id: 'ENCHANTED_IRON_INGOT', name: 'Enchanted Iron' },
                { id: 'ENCHANTED_DIAMOND', name: 'Enchanted Diamond' }
            ],
            combining: [
                { id: 'RECOMBOBULATOR_3000', name: 'Recombobulator' }
            ],
            bz: [
                { id: 'BOOSTER_COOKIE', name: 'Booster Cookie' },
                { id: 'STOCK_OF_STONKS', name: 'Stock of Stonks' }
            ]
        };

        function checkCode() {
            const input = document.getElementById('flipcode').value;
            const error = document.getElementById('error-msg');
            
            if (input === SECRET_CODE) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('category-menu').classList.remove('hidden');
            } else {
                // If it's wrong, show the error message clearly
                error.classList.remove('opacity-0');
                setTimeout(() => error.classList.add('opacity-0'), 3000);
                document.getElementById('flipcode').value = ''; // Clear input
            }
        }

        async function showFlips(category) {
            document.getElementById('category-menu').classList.add('hidden');
            document.getElementById('vault').classList.remove('hidden');
            
            const container = document.getElementById('dashboard');
            container.innerHTML = '<p class="text-stone-400 text-xs tracking-widest animate-pulse">REQUESTING BAZAAR DATA...</p>'; 

            try {
                const res = await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
                const data = await res.json();
                container.innerHTML = ''; 

                flipData[category].forEach(item => {
                    const stats = data.products[item.id].quick_status;
                    const profit = Math.floor(stats.sellPrice - stats.buyPrice);
                    
                    container.innerHTML += `
                        <div class="bg-white border border-stone-100 p-10 rounded-sm shadow-sm hover:shadow-md transition-all duration-500">
                            <h2 class="text-sm font-semibold tracking-tight text-stone-800 uppercase mb-1">${item.name}</h2>
                            <p class="text-[10px] text-stone-400 mb-8 uppercase tracking-widest italic">Live Spread Analysis</p>
                            <div class="flex justify-between items-baseline">
                                <span class="text-[9px] text-stone-300 uppercase font-bold tracking-tighter">Est. Margin</span>
                                <span class="text-2xl font-light tracking-tighter ${profit > 0 ? 'text-emerald-600' : 'text-rose-400'}">
                                    +${profit.toLocaleString()}
                                </span>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = '<p class="text-rose-400 text-xs">NETWORK ERROR: API UNREACHABLE</p>';
            }
        }

        function backToMenu() {
            document.getElementById('vault').classList.add('hidden');
            document.getElementById('category-menu').classList.remove('hidden');
        }
    </script>
</body>
</html>
