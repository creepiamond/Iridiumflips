<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <title>VAULT 1988</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9F7F2; color: #2D2926; }
        .btn-main { border: 1px solid #D1CDC7; background: #FFF; transition: all 0.4s ease; cursor: pointer; }
        .btn-main:hover { background-color: #ECFDF5; border-color: #10B981; color: #065F46; }
        .square-input {
            border: 1px solid #E5E1DA;
            background: #FFFFFF;
            letter-spacing: 0.8em;
            text-indent: 0.8em;
            border-radius: 0;
        }
        .luxury-card { background: white; border: 1px solid #E5E1DA; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">

    <div id="gate" class="text-center w-full max-w-md">
        <h1 class="text-[14px] tracking-[0.3em] text-stone-400 mb-10 uppercase font-light">
            Please type the flipcode for secured flips
        </h1>
        <input type="password" id="flipcode" maxlength="4" placeholder="••••" 
               class="square-input w-48 py-4 text-center text-xl outline-none focus:border-stone-900 mb-8">
        <button onclick="checkCode()" class="block mx-auto w-48 py-3 btn-main text-[10px] uppercase tracking-[0.3em]">Authorize</button>
    </div>

    <div id="menu" class="hidden w-full max-w-2xl">
        <h1 class="text-2xl font-light tracking-tighter text-center mb-12">THE <span class="font-semibold text-stone-400">VAULT</span></h1>
        <div class="grid gap-4">
            <button onclick="showFlips('crafting')" class="btn-main p-8 text-left flex justify-between items-center">
                <span>1. Crafting flips</span> <span>→</span>
            </button>
            <button onclick="showFlips('combining')" class="btn-main p-8 text-left flex justify-between items-center">
                <span>2. combining flips</span> <span>→</span>
            </button>
            <button onclick="showFlips('bz')" class="btn-main p-8 text-left flex justify-between items-center">
                <span>3. BS flips</span> <span>→</span>
            </button>
        </div>
    </div>

    <div id="vault" class="hidden w-full max-w-5xl">
        <button onclick="backToMenu()" class="text-[10px] uppercase tracking-widest text-stone-400 mb-8 hover:text-stone-900">← Back</button>
        <div class="border-l-2 border-emerald-500 bg-white p-6 mb-10 shadow-sm">
            <p id="strategy-desc" class="text-sm font-medium text-stone-700"></p>
        </div>
        <div id="dashboard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const SECRET_CODE = "1988";

        const flipData = {
            crafting: {
                title: "buy order 8x Alligator skin from BZ and craft quick bite 1 enchanted book or type /recipe quick bite for fast crafting then sell into bazaar",
                items: [{ id: 'ENCHANTED_BOOK:QUICK_BITE:1', name: 'Quick Bite 1' }]
            },
            combining: {
                title: "Buy order tier 1 books from bazaar and combine into tier 5 then sell order 16x t1 book = 1x t5 book",
                items: [{ id: 'ENCHANTED_BOOK:CHARM:1', name: 'Charm 1' }]
            },
            bz: {
                title: "BS flips",
                items: [
                    { id: 'ENCHANTED_RAW_RABBIT', name: 'Enchanted Raw Rabbit' },
                    { id: 'HALF_EATEN_MUSHROOM', name: 'Half-eaten mushroom' },
                    { id: 'FINE_FLOUR', name: 'Fine flour' }
                ]
            }
        };

        function checkCode() {
            if (document.getElementById('flipcode').value === SECRET_CODE) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('menu').classList.remove('hidden');
            }
        }

        async function showFlips(cat) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('vault').classList.remove('hidden');
            document.getElementById('strategy-desc').innerText = flipData[cat].title;
            
            const container = document.getElementById('dashboard');
            container.innerHTML = '<p class="text-stone-300 uppercase tracking-widest text-xs">Fetching Market Prices...</p>';

            try {
                const res = await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
                const data = await res.json();
                container.innerHTML = '';

                flipData[cat].items.forEach(item => {
                    const stats = data.products[item.id]?.quick_status;
                    if (stats) {
                        const profit = Math.floor(stats.sellPrice - stats.buyPrice);
                        container.innerHTML += `
                            <div class="luxury-card p-10">
                                <h2 class="text-[10px] tracking-[0.2em] text-stone-400 uppercase mb-6">${item.name}</h2>
                                <div class="flex justify-between items-baseline">
                                    <span class="text-[10px] text-stone-300 font-bold uppercase">Margin</span>
                                    <span class="text-3xl font-light ${profit > 0 ? 'text-emerald-600' : 'text-rose-400'}">
                                        +${profit.toLocaleString()}
                                    </span>
                                </div>
                            </div>`;
                    }
                });
            } catch (e) { container.innerHTML = "API Connection Failed"; }
        }

        function backToMenu() {
            document.getElementById('vault').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
        }
    </script>
</body>
</html>
