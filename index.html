<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>TERMINAL | CREEPIAMOND</title>
    <style>
        :root { 
            --bg: #0f1113; 
            --card-bg: rgba(25, 27, 30, 0.8);
            --accent: #10b981; 
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Moving Luxury Gradient Animation */
        @keyframes meshGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .animated-gate {
            background: linear-gradient(-45deg, #16181b, #1f2226, #142821, #16181b);
            background-size: 400% 400%;
            animation: meshGradient 15s ease infinite;
            border: 1px solid var(--border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .luxury-square {
            background: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .item-card {
            border: 1px solid rgba(16, 185, 129, 0.15);
            aspect-ratio: 1 / 1.1;
            transition: all 0.4s ease;
        }

        .item-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
            transform: translateY(-5px);
        }

        .square-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            color: var(--accent);
            transition: all 0.3s ease;
        }

        .square-input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.05);
        }

        .reveal { 
            opacity: 0; 
            animation: softFadeIn 1s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
        }
        @keyframes softFadeIn { 
            from { opacity: 0; transform: translateY(20px); filter: blur(10px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-8">

    <div class="fixed top-10 w-full text-center z-50">
        <p class="text-[10px] tracking-[1.5em] uppercase text-slate-600 font-black">CREEPIAMOND SECURED TERMINAL</p>
    </div>

    <div id="gate" class="w-full max-w-lg reveal">
        <div class="animated-gate p-16 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-emerald-500/50 to-transparent"></div>
            
            <div class="mb-12 text-center">
                <h1 class="text-xs font-bold tracking-[0.6em] text-slate-400 uppercase mb-4">Identity Verification</h1>
                <p class="text-sm text-slate-500 font-medium tracking-tight">Please type the flipcode for secured flips.</p>
            </div>
            
            <div class="space-y-8">
                <input type="password" id="flipcode" maxlength="8" placeholder="TERMINAL ACCESS CODE" 
                       onkeydown="if(event.key==='Enter') checkCode()" 
                       class="square-input w-full py-6 text-center text-lg font-bold tracking-[1em] placeholder:tracking-widest placeholder:text-slate-800 placeholder:text-xs">
                
                <button id="auth-btn" onclick="checkCode()" 
                        class="w-full py-5 bg-emerald-500/5 border border-emerald-500/20 text-emerald-500 text-xs font-black tracking-[0.4em] uppercase hover:bg-emerald-500 hover:text-black transition-all duration-700">
                    ESTABLISH CONNECTION
                </button>
            </div>
            <p id="error-msg" class="text-rose-500 text-[10px] text-center mt-6 uppercase tracking-[0.3em] opacity-0 font-bold transition-opacity">Unauthorized Token</p>
        </div>
    </div>

    <div id="menu" class="hidden w-full max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-10 reveal">
        <button onclick="showFlips('crafting')" class="luxury-square p-14 flex flex-col items-center gap-8 group">
            <div class="w-10 h-10 border border-emerald-500/20 flex items-center justify-center group-hover:border-emerald-500 transition-colors duration-500">
                <div class="w-5 h-5 border-2 border-emerald-500/10 border-t-emerald-500 rounded-full animate-spin"></div>
            </div>
            <div class="text-center">
                <span class="block text-2xl font-black tracking-tighter text-slate-200">CRAFTING</span>
                <span class="text-[9px] text-emerald-500/40 font-bold tracking-[0.5em] uppercase mt-2 block">Alpha System</span>
            </div>
        </button>

        <button onclick="showFlips('combining')" class="luxury-square p-14 flex flex-col items-center gap-8 group">
            <div class="w-10 h-10 border border-emerald-500/20 flex items-center justify-center group-hover:border-emerald-500 transition-colors duration-500">
                <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-width="1.5"/></svg>
            </div>
            <div class="text-center">
                <span class="block text-2xl font-black tracking-tighter text-slate-200">COMBINING</span>
                <span class="text-[9px] text-emerald-500/40 font-bold tracking-[0.5em] uppercase mt-2 block">Beta System</span>
            </div>
        </button>

        <button onclick="showFlips('bz')" class="luxury-square p-14 flex flex-col items-center gap-8 group">
            <div class="w-10 h-10 border border-emerald-500/20 flex items-center justify-center group-hover:border-emerald-500 transition-colors duration-500">
                <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" stroke-width="1.5"/></svg>
            </div>
            <div class="text-center">
                <span class="block text-2xl font-black tracking-tighter text-slate-200">BAZAAR</span>
                <span class="text-[9px] text-emerald-500/40 font-bold tracking-[0.5em] uppercase mt-2 block">Gamma System</span>
            </div>
        </button>
    </div>

    <div id="interface" class="hidden w-full max-w-[95rem] reveal">
        <div class="flex justify-between items-center mb-12 px-2">
            <button onclick="backToMenu()" class="text-[10px] font-black tracking-[0.4em] text-slate-500 hover:text-emerald-400 transition-all flex items-center gap-4">
                <span class="w-8 h-8 border border-slate-800 flex items-center justify-center">←</span>
                RETURN TO HUB
            </button>
            <div class="px-6 py-2 border border-emerald-500/20 bg-emerald-500/5">
                <span class="text-[10px] font-black text-emerald-400 tracking-[0.3em] uppercase">SYSTEM ONLINE</span>
            </div>
        </div>
        <div id="dashboard" class="grid grid-cols-1 gap-10"></div>
    </div>

    <script>
        const flipData = {
            crafting: {
                title: "Real-time crafting arbitrage. Currently scanning for high-margin recipes.",
                items: [{ id: 'ENCHANTED_BOOK:QUICK_BITE:1', name: 'Quick Bite 1' }]
            },
            combining: {
                title: "Enchantment synthesis. Acquire Tier 1 assets and upgrade for terminal profit.",
                items: [{ id: 'ENCHANTMENT_CHARM_1', name: 'Charm 1' },
                        { id: 'ENCHANTMENT_PROSPERITY_1', name: 'Prosperity 1' },
                        { id: 'ENCHANTMENT_LAPIDARITY_1', name: 'Lapidarity 1' }]
            },
            bz: {
                title: "High-velocity Bazaar spreads. Prioritizing instant liquidity assets.",
                items: [
                    { id: 'ENCHANTED_RAW_RABBIT', name: 'Enchanted Raw Rabbit' }, { id: 'HALF_EATEN_MUSHROOM', name: 'Half-eaten mushroom' },
                    { id: 'FINE_FLOUR', name: 'Fine flour' }, { id: 'ENCHANTED_PORK', name: 'Enchanted Raw Pork' },
                    { id: 'TUNGSTEN_KEY', name: 'Tungsten Key' }, { id: 'UMBER_KEY', name: 'Umber Key' },
                    { id: 'ENCHANTMENT_THUNDERBOLT_7', name: 'Thunderbolt 7' }, { id: 'ENCHANTMENT_THUNDERLORD_7', name: 'Thunderlord 7' },
                    { id: 'ENCHANTMENT_FIRE_PROTECTION_7', name: 'Fire Protection 7' }, { id: 'BUSTED_BELT_BUCKLE', name: 'Busted Belt Buckle' },
                    { id: 'RUSTY_COIN', name: 'Rusty Coin' }, { id: 'HOTSPOT_BAIT', name: 'Hotspot Bait' },
                    { id: 'ENCHANTED_TUNGSTEN', name: 'Enchanted Tungsten' }, { id: 'ENCHANTED_UMBER', name: 'Enchanted Umber' },
                    { id: 'KADA_LEAD', name: 'Kada Lead' }
                ]
            }
        };

        async function checkCode() {
            const inputField = document.getElementById('flipcode');
            const authBtn = document.getElementById('auth-btn');
            const error = document.getElementById('error-msg');
            authBtn.innerText = "AUTHENTICATING...";
            
            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: inputField.value })
                });
                const result = await response.json();
                if (result.success) {
                    document.getElementById('gate').classList.add('hidden');
                    document.getElementById('menu').classList.remove('hidden');
                } else { throw new Error(); }
            } catch (e) {
                authBtn.innerText = "ESTABLISH CONNECTION";
                error.classList.remove('opacity-0');
                setTimeout(() => error.classList.add('opacity-0'), 2000);
                inputField.value = '';
            }
        }

        async function showFlips(cat) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('interface').classList.remove('hidden');
            const container = document.getElementById('dashboard');
            
            container.innerHTML = `<div class="py-40 flex flex-col items-center gap-6">
                <div class="w-16 h-16 border border-emerald-500/20 border-t-emerald-500 animate-spin"></div>
                <p class="text-[10px] tracking-[1em] text-emerald-500 font-black">SYNCING MARKET DATA</p>
            </div>`;

            try {
                const res = await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
                const data = await res.json();
                
                container.innerHTML = `
                    <div class="luxury-square p-10 border-l-8 border-l-emerald-500 mb-6">
                        <p class="text-[10px] font-black text-emerald-500 uppercase tracking-[0.5em] mb-4">Strategic Intelligence</p>
                        <p class="text-2xl font-light text-slate-300 tracking-tight">${flipData[cat].title}</p>
                    </div>`;

                const itemsGrid = document.createElement('div');
                itemsGrid.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-8";
                
                flipData[cat].items.forEach(item => {
                    const product = data.products[item.id];
                    const stats = product?.quick_status;

                    if (stats) {
                        const spread = Math.floor(stats.buyPrice - stats.sellPrice);
                        const textureUrl = `https://sky.shiiyu.moe/item/${item.id}`;

                        itemsGrid.innerHTML += `
                            <div class="luxury-square item-card p-8 flex flex-col group reveal">
                                <div class="flex justify-center mb-10 relative">
                                    <div class="absolute inset-0 bg-emerald-500/10 blur-[50px] opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                    <img src="${textureUrl}" class="w-20 h-20 object-contain relative z-10 transition-transform duration-700 group-hover:scale-110" 
                                         onerror="this.src='https://mc-heads.net/item/${item.id}'">
                                </div>

                                <div class="text-center mb-8">
                                    <h2 class="text-sm font-black uppercase tracking-widest text-slate-100 group-hover:text-emerald-400 transition-colors">${item.name}</h2>
                                    <p class="text-[9px] text-slate-700 mt-2 mono font-bold">${item.id}</p>
                                </div>

                                <div class="space-y-4 mb-8 border-y border-white/5 py-6">
                                    <div class="flex justify-between items-center text-[11px]">
                                        <span class="text-slate-500 font-bold uppercase tracking-tighter">Buy Order Price</span>
                                        <span class="mono text-white font-bold">${Math.floor(stats.buyPrice).toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center text-[11px]">
                                        <span class="text-slate-500 font-bold uppercase tracking-tighter">Sell Order Price</span>
                                        <span class="mono text-white font-bold">${Math.floor(stats.sellPrice).toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center text-[10px] pt-2">
                                        <span class="text-slate-600 font-medium uppercase tracking-tighter">Weekly Insta Buy</span>
                                        <span class="mono text-slate-400">${Math.round(stats.buyVolume/1000)}k</span>
                                    </div>
                                    <div class="flex justify-between items-center text-[10px]">
                                        <span class="text-slate-600 font-medium uppercase tracking-tighter">Weekly Insta Sell</span>
                                        <span class="mono text-slate-400">${Math.round(stats.sellVolume/1000)}k</span>
                                    </div>
                                </div>

                                <div class="mt-auto">
                                    <p class="text-[9px] text-emerald-500/40 font-black uppercase mb-2 tracking-widest">Est. Net Profit</p>
                                    <p class="text-3xl font-black tracking-tighter text-emerald-500 mono">
                                        +${spread.toLocaleString()}
                                    </p>
                                </div>
                            </div>`;
                    }
                });
                container.appendChild(itemsGrid);

            } catch (e) {
                container.innerHTML = '<div class="text-center py-40 text-rose-500 font-black uppercase tracking-[0.5em]">SYSTEM ERROR: FEED OFFLINE</div>';
            }
        }

        function backToMenu() {
            document.getElementById('interface').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
        }
    </script>
</body>
</html>
