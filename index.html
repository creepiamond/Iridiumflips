<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>VAULT | CREEPIAMOND</title>
    <style>
        :root { --bg:#0f1117; --text:#f7f3ec; --muted:rgba(247,243,236,.58); --accent:#f2a65a; --accent-2:#34d399; --border:rgba(255,255,255,.14); }
        * { box-sizing: border-box; }
        body { font-family:'Inter',sans-serif; color:var(--text); overflow-x:hidden; background:radial-gradient(circle at 20% 12%,rgba(242,166,90,.20),transparent 34%),radial-gradient(circle at 82% 18%,rgba(52,211,153,.13),transparent 30%),radial-gradient(circle at 50% 95%,rgba(99,102,241,.11),transparent 38%),linear-gradient(135deg,#0b0d12 0%,#151821 48%,#0e1016 100%); }
        body::before { content:""; position:fixed; inset:0; pointer-events:none; background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px); background-size:48px 48px; mask-image:radial-gradient(circle at center,black,transparent 78%); }
        body::after { content:""; position:fixed; inset:0; pointer-events:none; background:linear-gradient(120deg,transparent,rgba(255,255,255,.045),transparent); animation:sheen 8s ease-in-out infinite; }
        @keyframes sheen { 0%,100%{transform:translateX(-120%);opacity:0} 45%,55%{opacity:1} 100%{transform:translateX(120%)} }
        @keyframes floatIn { from{opacity:0;transform:translateY(16px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
        @keyframes softPulse { 0%,100%{box-shadow:0 0 0 rgba(242,166,90,0)} 50%{box-shadow:0 0 36px rgba(242,166,90,.13)} }
        #gate,#menu,#vault { animation:floatIn .65s ease both; }
        .neon-white { color:#fffaf0; text-shadow:0 0 14px rgba(242,166,90,.28); }
        .luxury-box { position:relative; overflow:hidden; background:linear-gradient(180deg,rgba(255,255,255,.105),rgba(255,255,255,.055)); border:1px solid var(--border); box-shadow:0 24px 70px rgba(0,0,0,.26); backdrop-filter:blur(18px); border-radius:24px; transition:transform .35s ease,border-color .35s ease,box-shadow .35s ease,background .35s ease; }
        .luxury-box::before { content:""; position:absolute; inset:0; pointer-events:none; background:linear-gradient(135deg,rgba(255,255,255,.14),transparent 42%); opacity:.55; }
        .luxury-box:hover { border-color:rgba(242,166,90,.45); box-shadow:0 30px 85px rgba(0,0,0,.34),0 0 35px rgba(242,166,90,.08); transform:translateY(-5px); }
        .btn-modern { position:relative; overflow:hidden; border:1px solid rgba(242,166,90,.38); background:linear-gradient(180deg,rgba(255,255,255,.095),rgba(255,255,255,.045)); color:#fff6e8; border-radius:18px; box-shadow:0 18px 45px rgba(0,0,0,.24); backdrop-filter:blur(16px); transition:transform .28s ease,border-color .28s ease,box-shadow .28s ease,background .28s ease; }
        .btn-modern::after { content:""; position:absolute; inset:0; transform:translateX(-120%); background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent); transition:transform .6s ease; }
        .btn-modern:hover { background:linear-gradient(135deg,rgba(242,166,90,.95),rgba(255,206,145,.85)); border-color:rgba(255,255,255,.36); color:#16120e; box-shadow:0 22px 60px rgba(242,166,90,.22); transform:translateY(-3px); }
        .btn-modern:hover::after { transform:translateX(120%); }
        .square-input { background:rgba(255,255,255,.075); border:1px solid rgba(255,255,255,.16); border-radius:18px; letter-spacing:.9em; text-indent:.9em; color:var(--text); box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 18px 40px rgba(0,0,0,.18); backdrop-filter:blur(14px); transition:border-color .25s ease,box-shadow .25s ease,background .25s ease; }
        .square-input::placeholder { color:rgba(247,243,236,.33); }
        .square-input:focus { border-color:rgba(242,166,90,.75); outline:none; background:rgba(255,255,255,.105); animation:softPulse 1.8s ease infinite; }
        #auth-btn { font-weight:800; } #error-msg { color:#fb7185; }
        img { transition:transform .35s ease,filter .35s ease; } .luxury-box:hover img { transform:translateY(-4px) scale(1.05); filter:drop-shadow(0 18px 22px rgba(0,0,0,.35)); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="fixed top-8 w-full text-center z-50">
        <p class="text-[10px] tracking-[0.8em] uppercase text-white/45 font-semibold">Flips by creepiamond</p>
    </div>

    <div id="gate" class="text-center w-full max-w-sm">
        <h1 class="text-2xl tracking-[0.4em] mb-12 font-light uppercase text-white">Authentication</h1>
        <p class="text-[10px] text-white/45 mb-6 uppercase tracking-widest">Please type the flipcode for secured flips</p>
        <input type="password" id="flipcode" maxlength="8" placeholder="••••" onkeydown="if(event.key==='Enter') checkCode()" class="square-input w-full py-4 text-center text-xl mb-6">
        <button id="auth-btn" onclick="checkCode()" class="btn-modern w-full py-4 text-[10px] uppercase tracking-[0.4em]">Authorize</button>
        <p id="error-msg" class="text-rose-500 text-[10px] mt-4 uppercase tracking-widest opacity-0 transition-opacity">Access Denied</p>
    </div>

    <div id="menu" class="hidden w-full max-w-2xl animate-in fade-in duration-700">
        <div class="grid gap-6">
            <button onclick="showFlips('crafting')" class="btn-modern p-10 text-left flex justify-between items-center group">
                <span class="text-lg font-light tracking-widest">CRAFTING</span>
                <span class="opacity-40 group-hover:opacity-100 group-hover:text-white transition-opacity">SELECT</span>
            </button>
            <button onclick="showFlips('combining')" class="btn-modern p-10 text-left flex justify-between items-center group">
                <span class="text-lg font-light tracking-widest">COMBINING</span>
                <span class="opacity-40 group-hover:opacity-100 group-hover:text-white transition-opacity">SELECT</span>
            </button>
            <button onclick="showFlips('bz')" class="btn-modern p-10 text-left flex justify-between items-center group">
                <span class="text-lg font-light tracking-widest">BUY/SELL FLIPS</span>
                <span class="opacity-40 group-hover:opacity-100 group-hover:text-white transition-opacity">SELECT</span>
            </button>
        </div>
    </div>

    <div id="vault" class="hidden w-full max-w-6xl">
        <div class="flex justify-between items-center mb-12">
            <button onclick="backToMenu()" class="text-[10px] tracking-widest text-emerald-300 hover:text-amber-200 uppercase">← Back to Strategies</button>
        </div>
        <div id="dashboard" class="grid grid-cols-1 gap-8"></div>
    </div>

    <script>
        const flipData = {
            crafting: {
                title: "No craft flips available right now. Try the Quick Bite 1 craft flip: type /recipe quick bite in game chat.",
                items: [{ id: 'ENCHANTED_BOOK:QUICK_BITE:1', name: 'Quick Bite 1' }]
            },
            combining: {
                title: "Create a buy order for Tier 1 books, combine them into Tier 5 books, then sell order for profit.",
                items: [{ id: 'ENCHANTMENT_CHARM_1', name: 'Charm 1' },
                        { id: 'ENCHANTMENT_PROSPERITY_1', name: 'Prosperity 1' },
                        { id: 'ENCHANTMENT_LAPIDARITY_1', name: 'Lapidarity 1' }]
            },
            bz: {
                title: "Real-time spread analysis for standard high-volume bazaar items.",
                items: [
                    { id: 'ENCHANTED_RAW_RABBIT', name: 'Enchanted Raw Rabbit' },
                    { id: 'HALF_EATEN_MUSHROOM', name: 'Half-eaten mushroom' },
                    { id: 'FINE_FLOUR', name: 'Fine flour' },
                    { id: 'ENCHANTED_PORK', name: 'Enchanted Raw Pork' },
                    { id: 'TUNGSTEN_KEY', name: 'Tungsten Key' },
                    { id: 'UMBER_KEY', name: 'Umber Key' },
                    { id: 'ENCHANTMENT_THUNDERBOLT_7', name: 'Thunderbolt 7' },
                    { id: 'ENCHANTMENT_THUNDERLORD_7', name: 'Thunderlord 7' },
                    { id: 'ENCHANTMENT_FIRE_PROTECTION_7', name: 'Fire Protection 7' },
                    { id: 'BUSTED_BELT_BUCKLE', name: 'Busted Belt Buckle' },
                    { id: 'RUSTY_COIN', name: 'Rusty Coin' },
                    { id: 'HOTSPOT_BAIT', name: 'Hotspot Bait' },
                    { id: 'ENCHANTED_TUNGSTEN', name: 'Enchanted Tungsten' },
                    { id: 'ENCHANTED_UMBER', name: 'Enchanted Umber' },
                    { id: 'KADA_LEAD', name: 'Kada Lead' }
                ]
            }
        };

        async function checkCode() {
            const inputField = document.getElementById('flipcode');
            const authBtn = document.getElementById('auth-btn');
            const error = document.getElementById('error-msg');
            const originalText = authBtn.innerText;
            authBtn.innerText = "VERIFYING...";
            
            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: inputField.value })
                });
                const result = await response.json();
                if (result.success) {
                    document.getElementById('gate').style.display = 'none';
                    document.getElementById('menu').classList.remove('hidden');
                } else { throw new Error(); }
            } catch (e) {
                authBtn.innerText = originalText;
                error.classList.remove('opacity-0');
                setTimeout(() => error.classList.add('opacity-0'), 2000);
                inputField.value = '';
            }
        }

        async function showFlips(cat) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('vault').classList.remove('hidden');
            
            const container = document.getElementById('dashboard');
            container.innerHTML = '<div class="text-center py-20 tracking-[1em] text-xs animate-pulse text-white/45">LOADING DATA...</div>';

            try {
                const res = await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
                const data = await res.json();
                container.innerHTML = '';

                // Strategy Title Box
                container.innerHTML += `
                    <div class="luxury-box p-8 mb-4 border-l-4 border-l-emerald-400">
                        <p class="text-xs tracking-widest text-emerald-300 font-bold uppercase mb-2">Strategy</p>
                        <p class="text-sm font-light leading-relaxed text-white/70">${flipData[cat].title}</p>
                    </div>`;

                const itemsGrid = document.createElement('div');
                itemsGrid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4";
                
                flipData[cat].items.forEach(item => {
                    const product = data.products[item.id];
                    const stats = product?.quick_status;

                    if (stats) {
                        const buyPrice = Math.floor(stats.buyPrice);
                        const sellPrice = Math.floor(stats.sellPrice);
                        const spread = buyPrice - sellPrice;
                        const weeklyBuy = stats.buyMovingWeek || 0;
                        const weeklySell = stats.sellMovingWeek || 0;
                        const spreadColor = spread >= 0 ? "text-emerald-300" : "text-rose-400";
                        const spreadSymbol = spread >= 0 ? "+" : "";
                        
                        // FIXED: Using Coflnet (SkyCrypt Style) and SkyHelper fallback logic
                        const cleanId = item.id.split(':')[0];
                        const textureUrl = `https://sky.coflnet.com/static/items/${cleanId}.png`;
                        const fallbackUrl = `https://raw.githubusercontent.com/SkyHelperBot/SkyHelper-Assets/main/items/${cleanId}.png`;

                        itemsGrid.innerHTML += `
                            <div class="luxury-box p-8 flex flex-col items-center justify-between min-h-[350px] text-center">
                                <img src="${textureUrl}" 
                                     onerror="this.onerror=null; this.src='${fallbackUrl}'; this.addEventListener('error', function(){this.src='https://mc-heads.net/item/${cleanId.toLowerCase()}';});" 
                                     class="w-16 h-16 object-contain mb-4 mx-auto block drop-shadow-md">
                                <h2 class="neon-white text-[11px] tracking-[0.2em] uppercase mb-6 bg-white/10 border border-white/10 rounded-full py-2 px-3 inline-block w-fit mx-auto">
                                    ${item.name}
                                </h2>

                                <div class="space-y-4 text-left w-full px-4">
                                    <div class="flex justify-between items-center text-[10px] border-b border-white/10 pb-2 gap-4">
                                        <span class="text-white/45 uppercase whitespace-nowrap">Buy Order Price</span>
                                        <span class="font-semibold text-right">${buyPrice.toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center text-[10px] border-b border-white/10 pb-2 gap-4">
                                        <span class="text-white/45 uppercase whitespace-nowrap">Sell Order Price</span>
                                        <span class="font-semibold text-right">${sellPrice.toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center text-[10px] border-b border-white/10 pb-2 gap-4">
                                        <span class="text-white/45 uppercase whitespace-nowrap">Weekly Insta Buy</span>
                                        <span class="font-semibold text-right">${Math.floor(weeklyBuy).toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center text-[10px] border-b border-white/10 pb-2 gap-4">
                                        <span class="text-white/45 uppercase whitespace-nowrap">Weekly Insta Sell</span>
                                        <span class="font-semibold text-right">${Math.floor(weeklySell).toLocaleString()}</span>
                                    </div>
                                </div>
                                <div class="pt-4 flex justify-between items-baseline w-full border-t border-white/10 mt-auto">
                                    <span class="text-[9px] text-emerald-300 font-bold tracking-tighter uppercase">PROFIT PER ITEM</span>
                                    <span class="text-xl font-light tracking-tighter ${spreadColor}">
                                        ${spreadSymbol}${spread.toLocaleString()}
                                    </span>
                                </div>
                            </div>`;
                    }
                });
                container.appendChild(itemsGrid);

            } catch (e) {
                console.error(e);
                container.innerHTML = '<div class="text-center py-20 text-rose-500 uppercase tracking-widest text-xs">API OFFLINE OR ERROR</div>';
            }
        }

        function backToMenu() {
            document.getElementById('vault').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
        }
    </script>
</body>
</html>
