<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600&family=JetBrains+Mono:wght@100;400;700&display=swap" rel="stylesheet">
    <title>VAULT</title>
    <style>
        :root {
            --bg: #f8f7f4; --text: #121212; --border: rgba(0,0,0,0.06);
            --accent: #ff9f66; --accent-glow: rgba(255,159,102,0.15);
            --card-bg: rgba(255,255,255,0.6);
        }
        .dark {
            --bg: #050505; --text: #e2e2e2; --border: rgba(255,255,255,0.06);
            --accent: #ff9f66; --accent-glow: rgba(255,159,102,0.3);
            --card-bg: rgba(15,15,15,0.6);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Technical Background Detail */
        .v-grid {
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 90%);
        }

        .v-scanner {
            position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.1; z-index: -1;
            animation: scan 8s linear infinite;
        }

        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        /* High-End Card Styling */
        .v-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
        }

        .v-card::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent 0%, var(--accent-glow) 100%);
            opacity: 0; transition: opacity 0.4s;
        }

        .v-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .v-card:hover::after { opacity: 1; }

        /* Button Logic */
        .v-btn {
            background: transparent; border: 1px solid var(--border);
            text-transform: uppercase; letter-spacing: 0.3em; font-size: 10px;
            font-weight: 600; transition: all 0.3s;
            position: relative;
        }

        .v-btn:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .tab-active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Hide Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="v-grid"></div>
    <div class="v-scanner"></div>

    <nav class="fixed top-0 w-full p-8 flex justify-between items-start z-50 pointer-events-none">
        <div class="pointer-events-auto">
            <span class="text-[10px] tracking-[0.8em] font-bold opacity-40 uppercase">Vault v2.4</span>
        </div>
        <div class="flex gap-6 pointer-events-auto items-center">
            <div id="clock" class="mono text-[10px] opacity-40">00:00:00</div>
            <button onclick="toggleTheme()" class="w-8 h-8 rounded-full border border-stone-200 dark:border-stone-800 flex items-center justify-center hover:scale-110 transition">
                <div class="w-2 h-2 bg-orange-400 rounded-full animate-pulse"></div>
            </button>
        </div>
    </nav>

    <main id="gate" class="flex flex-col items-center justify-center min-h-screen transition-all duration-700">
        <div class="w-full max-w-sm px-8">
            <div class="mb-12 space-y-2">
                <h2 class="text-[10px] tracking-[1em] opacity-30 uppercase text-center">Security Gateway</h2>
                <div class="h-[1px] w-full bg-gradient-to-r from-transparent via-stone-300 dark:via-stone-700 to-transparent"></div>
            </div>
            <input type="password" id="flipcode" maxlength="4" placeholder="••••" 
                   class="mono w-full bg-transparent border-b border-stone-300 dark:border-stone-700 text-center py-4 text-3xl focus:outline-none focus:border-orange-400 transition-colors mb-8">
            <button onclick="Core.authenticate()" class="v-btn w-full py-5">Decrypt Access</button>
            <p id="error-msg" class="text-[9px] text-rose-500 mt-8 uppercase tracking-[0.4em] text-center opacity-0 transition-opacity">Access Restricted</p>
        </div>
    </main>

    <main id="app" class="hidden container mx-auto px-6 py-32">
        <header class="mb-20 flex flex-col md:flex-row md:items-end justify-between gap-8">
            <div>
                <h1 class="text-4xl font-light tracking-tighter mb-4">Market Index</h1>
                <div class="flex gap-8 mono text-[10px] opacity-40 uppercase tracking-widest">
                    <span>Tax Rate: 1.125%</span>
                    <span>Status: Synchronized</span>
                </div>
            </div>
            <div class="flex gap-4">
                <button onclick="Core.switchTab('bz')" class="v-btn px-8 py-3 bg-white dark:bg-stone-900">General</button>
                <button onclick="Core.switchTab('combining')" class="v-btn px-8 py-3 bg-white dark:bg-stone-900">Logic</button>
                <button onclick="Core.switchTab('crafting')" class="v-btn px-8 py-3 bg-white dark:bg-stone-900">Archive</button>
            </div>
        </header>

        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </main>

    <script>
        // High-End State Manager
        const Core = {
            code: "3335",
            tax: 0.01125,
            currentTab: 'bz',
            data: null,
            items: {
                bz: [
                    { id: 'ENCHANTED_RAW_RABBIT', name: 'Ench. Rabbit' },
                    { id: 'HALF_EATEN_MUSHROOM', name: 'Half-Eaten Mushroom' },
                    { id: 'FINE_FLOUR', name: 'Fine Flour' },
                    { id: 'TUNGSTEN_KEY', name: 'Tungsten Key' },
                    { id: 'UMBER_KEY', name: 'Umber Key' },
                    { id: 'ENCHANTED_TUNGSTEN', name: 'Ench. Tungsten' },
                    { id: 'RUSTY_COIN', name: 'Rusty Coin' },
                    { id: 'KADA_LEAD', name: 'Kada Lead' }
                ],
                combining: [
                    { id: 'ENCHANTMENT_CHARM_1', name: 'Charm I' },
                    { id: 'ENCHANTMENT_PROSPERITY_1', name: 'Prosperity I' },
                    { id: 'ENCHANTMENT_LAPIDARITY_1', name: 'Lapidarity I' }
                ],
                crafting: [
                    { id: 'ENCHANTED_BOOK:QUICK_BITE:1', name: 'Quick Bite I' }
                ]
            },

            async authenticate() {
                const val = document.getElementById('flipcode').value;
                if(val === this.code) {
                    document.getElementById('gate').classList.add('opacity-0', 'scale-95');
                    setTimeout(() => {
                        document.getElementById('gate').style.display = 'none';
                        document.getElementById('app').classList.remove('hidden');
                        this.refresh();
                    }, 500);
                } else {
                    const err = document.getElementById('error-msg');
                    err.style.opacity = '1';
                    setTimeout(() => err.style.opacity = '0', 2000);
                }
            },

            switchTab(tab) {
                this.currentTab = tab;
                this.render();
            },

            async refresh() {
                try {
                    const res = await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
                    const json = await res.json();
                    if(json.success) {
                        this.data = json.products;
                        this.render();
                    }
                } catch(e) {
                    console.error("Link Failure", e);
                }
                setTimeout(() => this.refresh(), 30000); // 30s auto-refresh
            },

            render() {
                const container = document.getElementById('grid');
                container.innerHTML = '';
                
                this.items[this.currentTab].forEach(item => {
                    const prod = this.data[item.id]?.quick_status;
                    if(!prod) return;

                    const bPrice = Math.floor(prod.buyPrice);
                    const sPrice = Math.floor(prod.sellPrice);
                    const gross = bPrice - sPrice;
                    const net = Math.floor(gross - (bPrice * this.tax));
                    const volume = Math.floor(prod.buyMovingWeek / 1000);

                    const card = `
                        <div class="v-card p-8 group">
                            <div class="flex justify-between items-start mb-10">
                                <div class="w-12 h-12 bg-white dark:bg-stone-900 border border-stone-200 dark:border-stone-800 p-2 relative z-10">
                                    <img src="https://sky.shiiyu.moe/item/${item.id}" 
                                         onerror="this.src='https://mc-heads.net/item/${item.id.toLowerCase()}';" 
                                         class="w-full h-full object-contain">
                                </div>
                                <div class="text-right mono opacity-40">
                                    <p class="text-[8px] uppercase">7D Vol</p>
                                    <p class="text-[10px] font-bold">${volume}K</p>
                                </div>
                            </div>

                            <h3 class="text-xs font-bold tracking-widest uppercase mb-6 truncate relative z-10">${item.name}</h3>

                            <div class="space-y-3 mb-8 relative z-10">
                                <div class="flex justify-between text-[10px] mono">
                                    <span class="opacity-40 uppercase">Buy Order</span>
                                    <span>${bPrice.toLocaleString()}</span>
                                </div>
                                <div class="flex justify-between text-[10px] mono">
                                    <span class="opacity-40 uppercase">Sell Order</span>
                                    <span>${sPrice.toLocaleString()}</span>
                                </div>
                            </div>

                            <div class="pt-6 border-t border-stone-200 dark:border-stone-800 flex justify-between items-end relative z-10">
                                <div>
                                    <p class="text-[8px] opacity-40 uppercase mb-1">Net Margin</p>
                                    <p class="text-lg mono font-bold ${net > 0 ? 'text-emerald-500' : 'text-rose-500'}">
                                        ${net > 0 ? '+' : ''}${net.toLocaleString()}
                                    </p>
                                </div>
                                <div class="text-[8px] mono opacity-30">
                                    -1.1% TAX
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', card);
                });
            }
        };

        // Theme & Clock Utility
        function toggleTheme() { document.body.classList.toggle('dark'); }
        
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toTimeString().split(' ')[0];
        }, 1000);
    </script>
</body>
</html>
