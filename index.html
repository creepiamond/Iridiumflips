<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;600&display=swap" rel="stylesheet">
    <title>THE VAULT | CREEPIAMOND</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ffffff; overflow-x: hidden; }
        
        .neon-text { text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.4); }
        
        .luxury-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .luxury-box:hover {
            border-color: rgba(16, 185, 129, 1);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.2);
            transform: translateY(-2px);
        }

        .btn-modern {
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-modern:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .square-input {
            background: rgba(255,255,255,0.03);
            border: 1px solid #222;
            letter-spacing: 1em;
            text-indent: 1em;
            color: white;
        }

        .square-input:focus { border-color: #10b981; outline: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="fixed top-8 w-full text-center z-50">
        <p class="text-[10px] tracking-[0.8em] uppercase opacity-40 font-light">Flips by creepiamond</p>
    </div>

    <div id="gate" class="text-center w-full max-w-sm">
        <h1 class="neon-text text-xl tracking-[0.5em] mb-12 font-extralight uppercase">Authentication</h1>
        <p class="text-[10px] text-stone-500 mb-6 uppercase tracking-widest">Please type the flipcode for secured flips</p>
        <input type="password" id="flipcode" maxlength="4" placeholder="••••" 
               class="square-input w-full py-4 text-center text-xl mb-6">
        <button onclick="checkCode()" class="btn-modern w-full py-4 text-[10px] uppercase tracking-[0.4em]">Initialize</button>
        <p id="error-msg" class="text-rose-500 text-[10px] mt-4 uppercase tracking-widest opacity-0 transition-opacity">Access Denied</p>
    </div>

    <div id="menu" class="hidden w-full max-w-2xl animate-in fade-in zoom-in duration-700">
        <div class="grid gap-6">
            <button onclick="showFlips('crafting')" class="btn-modern p-10 text-left flex justify-between items-center group">
                <span class="text-lg font-light tracking-widest">01 // CRAFTING</span>
                <span class="opacity-20 group-hover:opacity-100 group-hover:text-emerald-400">SELECT</span>
            </button>
            <button onclick="showFlips('combining')" class="btn-modern p-10 text-left flex justify-between items-center group">
                <span class="text-lg font-light tracking-widest">02 // COMBINING</span>
                <span class="opacity-20 group-hover:opacity-100 group-hover:text-emerald-400">SELECT</span>
            </button>
            <button onclick="showFlips('bz')" class="btn-modern p-10 text-left flex justify-between items-center group">
                <span class="text-lg font-light tracking-widest">03 // BZ FLIPS</span>
                <span class="opacity-20 group-hover:opacity-100 group-hover:text-emerald-400">SELECT</span>
            </button>
        </div>
    </div>

    <div id="vault" class="hidden w-full max-w-6xl">
        <div class="flex justify-between items-center mb-12">
            <button onclick="backToMenu()" class="text-[10px] tracking-widest text-emerald-500 hover:neon-text uppercase">← Return</button>
        </div>
        <div id="dashboard" class="grid grid-cols-1 gap-8"></div>
    </div>

    <script>
        const SECRET_CODE = "1988";

        const flipData = {
            crafting: {
                title: "buy order 8x Alligator skin from BZ and craft quick bite 1 enchanted book or type /recipe quick bite for fast crafting then sell into bazaar",
                items: [{ id: 'ENCHANTED_BOOK:QUICK_BITE:1', name: 'Quick Bite 1' }]
            },
            combining: {
                title: "Buy order tier 1 books from bazaar and combine into tier 5 then sell order 16x t1 book = 1x t5 book",
                items: [{ id: 'ENCHANTED_BOOK:CHARM:1', name: 'Charm 1' }]
            },
            bz: {
                title: "Real-time spread analysis for standard high-volume items",
                items: [
                    { id: 'ENCHANTED_RAW_RABBIT', name: 'Enchanted Raw Rabbit' },
                    { id: 'HALF_EATEN_MUSHROOM', name: 'Half-eaten mushroom' },
                    { id: 'FINE_FLOUR', name: 'Fine flour' },
                    { id: 'KADA_LEAD', name: 'Kada Lead' }
                ]
            }
        };

        function checkCode() {
            const input = document.getElementById('flipcode').value;
            const error = document.getElementById('error-msg');
            if (input === SECRET_CODE) {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('menu').classList.remove('hidden');
            } else {
                error.classList.remove('opacity-0');
                setTimeout(() => error.classList.add('opacity-0'), 2000);
                document.getElementById('flipcode').value = '';
            }
        }

        async function showFlips(cat) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('vault').classList.remove('hidden');
            
            const container = document.getElementById('dashboard');
            container.innerHTML = '<div class="text-center py-20 neon-text tracking-[1em] text-xs animate-pulse">SYNCHRONIZING...</div>';

            try {
                const res = await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
                const data = await res.json();
                container.innerHTML = '';

                // Strategy Title Box
                container.innerHTML += `
                    <div class="luxury-box p-8 mb-4 border-l-4 border-l-emerald-500">
                        <p class="text-xs tracking-widest text-emerald-400 font-bold uppercase mb-2">Strategy Intelligence</p>
                        <p class="text-sm font-light leading-relaxed opacity-80">${flipData[cat].title}</p>
                    </div>`;

                const itemsGrid = document.createElement('div');
                itemsGrid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4";
                
                flipData[cat].items.forEach(item => {
                    const stats = data.products[item.id]?.quick_status;
                    if (stats) {
                        const isBZ = cat === 'bz';
                        itemsGrid.innerHTML += `
                            <div class="luxury-box p-8 flex flex-col justify-between min-h-[200px]">
                                <h2 class="text-[10px] tracking-[0.3em] text-stone-500 uppercase mb-4">${item.name}</h2>
                                <div class="space-y-4">
                                    <div class="flex justify-between items-center text-[10px] border-b border-white/5 pb-2">
                                        <span class="opacity-40 uppercase">Buy Order</span>
                                        <span>${Math.floor(stats.buyPrice).toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center text-[10px] border-b border-white/5 pb-2">
                                        <span class="opacity-40 uppercase">Sell Order</span>
                                        <span>${Math.floor(stats.sellPrice).toLocaleString()}</span>
                                    </div>
                                    <div class="pt-4 flex justify-between items-baseline">
                                        <span class="text-[9px] text-emerald-500 font-bold tracking-tighter uppercase">Net Spread</span>
                                        <span class="text-2xl font-extralight tracking-tighter text-white">
                                            +${Math.floor(stats.sellPrice - stats.buyPrice).toLocaleString()}
                                        </span>
                                    </div>
                                </div>
                            </div>`;
                    }
                });
                container.appendChild(itemsGrid);
            } catch (e) { container.innerHTML = "API LINK SEVERED"; }
        }

        function backToMenu() {
            document.getElementById('vault').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
        }
    </script>
</body>
</html>
