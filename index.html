<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>VAULT | CREEPIAMOND</title>
    <style>
        :root { 
            --bg: #090a0f; 
            --surface: #11141d;
            --accent: #10b981; 
            --accent-glow: rgba(16, 185, 129, 0.25);
            --border: rgba(255, 255, 255, 0.08);
            --text-muted: rgba(156, 163, 175, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg);
            color: #f8fafc;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
        }

        /* Moving Glass Sheen */
        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(125deg, transparent 40%, rgba(255,255,255,0.03) 50%, transparent 60%);
            background-size: 200% 200%;
            animation: moveSheen 12s linear infinite;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes moveSheen { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .luxury-card {
            background: linear-gradient(165deg, rgba(20, 24, 35, 0.8), rgba(13, 16, 23, 0.95));
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .luxury-card:hover {
            border-color: var(--accent);
            transform: translateY(-10px);
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.5), 0 0 30px var(--accent-glow);
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            font-weight: 600;
            letter-spacing: 0.1em;
            position: relative;
            overflow: hidden;
        }

        .btn-action:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 15px 30px var(--accent-glow);
            transform: scale(1.02);
            border-color: transparent;
        }

        .premium-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 24px;
            transition: all 0.3s ease;
            color: var(--accent);
        }

        .premium-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 25px var(--accent-glow);
            background: rgba(16, 185, 129, 0.05);
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-reveal { animation: fadeInUp 0.8s cubic-bezier(0.2, 1, 0.3, 1) both; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">

    <div class="fixed top-12 w-full text-center z-50">
        <p class="text-[11px] tracking-[1.4em] uppercase text-white/20 font-bold">FLIPS BY CREEPIAMOND</p>
    </div>

    <div id="gate" class="w-full max-w-md animate-reveal">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold tracking-tighter mb-4 italic">VAULT<span class="text-emerald-500">.</span></h1>
            <div class="h-1 w-12 bg-emerald-500 mx-auto rounded-full"></div>
        </div>
        
        <div class="luxury-card p-10 space-y-8">
            <div class="space-y-2">
                <p class="text-[10px] text-white/30 uppercase tracking-[0.4em] font-bold text-center">Security Protocol Required</p>
                <input type="password" id="flipcode" maxlength="8" placeholder="••••" onkeydown="if(event.key==='Enter') checkCode()" 
                       class="premium-input w-full py-6 text-center text-3xl font-bold tracking-[0.6em]">
            </div>
            
            <button id="auth-btn" onclick="checkCode()" class="btn-action w-full py-6 text-[11px] uppercase tracking-[0.5em]">
                Initialize Connection
            </button>
            <p id="error-msg" class="text-rose-500 text-[10px] text-center uppercase tracking-widest opacity-0 transition-opacity font-bold">Access Revoked: Invalid Token</p>
        </div>
    </div>

    <div id="menu" class="hidden w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-8 animate-reveal">
        <button onclick="showFlips('crafting')" class="luxury-card p-12 flex flex-col items-center gap-6 group">
            <div class="p-4 rounded-2xl bg-white/5 border border-white/5 group-hover:border-emerald-500/50 transition-colors">
                <div class="w-8 h-8 rounded-full border-2 border-emerald-500/30 border-t-emerald-500 animate-spin"></div>
            </div>
            <span class="text-xl font-bold tracking-tight">CRAFTING</span>
            <span class="text-[9px] text-emerald-500/50 font-bold tracking-widest">SUB-TERMINAL 01</span>
        </button>
        <button onclick="showFlips('combining')" class="luxury-card p-12 flex flex-col items-center gap-6 group">
            <div class="p-4 rounded-2xl bg-white/5 border border-white/5 group-hover:border-emerald-500/50 transition-colors text-emerald-500">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <span class="text-xl font-bold tracking-tight">COMBINING</span>
            <span class="text-[9px] text-emerald-500/50 font-bold tracking-widest">SUB-TERMINAL 02</span>
        </button>
        <button onclick="showFlips('bz')" class="luxury-card p-12 flex flex-col items-center gap-6 group">
            <div class="p-4 rounded-2xl bg-white/5 border border-white/5 group-hover:border-emerald-500/50 transition-colors text-emerald-500">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            </div>
            <span class="text-xl font-bold tracking-tight">BAZAAR</span>
            <span class="text-[9px] text-emerald-500/50 font-bold tracking-widest">SUB-TERMINAL 03</span>
        </button>
    </div>

    <div id="vault" class="hidden w-full max-w-7xl">
        <div class="flex justify-between items-center mb-12">
            <button onclick="backToMenu()" class="text-[10px] font-bold tracking-[0.4em] text-white/30 hover:text-emerald-400 transition-colors uppercase flex items-center gap-4 group">
                <span class="w-8 h-8 rounded-full border border-white/10 flex items-center justify-center group-hover:border-emerald-500">←</span>
                Back to Terminal
            </button>
            <div class="px-6 py-2 rounded-full border border-emerald-500/20 bg-emerald-500/5">
                <p class="text-[9px] text-emerald-400 font-bold tracking-[0.2em] uppercase">Market Pulse: Active</p>
            </div>
        </div>
        <div id="dashboard" class="grid grid-cols-1 gap-10"></div>
    </div>

    <script>
        const flipData = {
            crafting: {
                title: "No craft flips available right now. Try the Quick Bite 1 craft flip: type /recipe quick bite in game chat.",
                items: [{ id: 'ENCHANTED_BOOK:QUICK_BITE:1', name: 'Quick Bite 1' }]
            },
            combining: {
                title: "Market Strategy: Mass-buy T1 books. Synthesize into T5 variants. Liquidate for high-margin gains.",
                items: [{ id: 'ENCHANTMENT_CHARM_1', name: 'Charm 1' },
                        { id: 'ENCHANTMENT_PROSPERITY_1', name: 'Prosperity 1' },
                        { id: 'ENCHANTMENT_LAPIDARITY_1', name: 'Lapidarity 1' }]
            },
            bz: {
                title: "Operational Status: Scanning real-time spreads for high-velocity Bazaar assets.",
                items: [
                    { id: 'ENCHANTED_RAW_RABBIT', name: 'Enchanted Raw Rabbit' }, { id: 'HALF_EATEN_MUSHROOM', name: 'Half-eaten mushroom' },
                    { id: 'FINE_FLOUR', name: 'Fine flour' }, { id: 'ENCHANTED_PORK', name: 'Enchanted Raw Pork' },
                    { id: 'TUNGSTEN_KEY', name: 'Tungsten Key' }, { id: 'UMBER_KEY', name: 'Umber Key' },
                    { id: 'ENCHANTMENT_THUNDERBOLT_7', name: 'Thunderbolt 7' }, { id: 'ENCHANTMENT_THUNDERLORD_7', name: 'Thunderlord 7' },
                    { id: 'ENCHANTMENT_FIRE_PROTECTION_7', name: 'Fire Protection 7' }, { id: 'BUSTED_BELT_BUCKLE', name: 'Busted Belt Buckle' },
                    { id: 'RUSTY_COIN', name: 'Rusty Coin' }, { id: 'HOTSPOT_BAIT', name: 'Hotspot Bait' },
                    { id: 'ENCHANTED_TUNGSTEN', name: 'Enchanted Tungsten' }, { id: 'ENCHANTED_UMBER', name: 'Enchanted Umber' },
                    { id: 'KADA_LEAD', name: 'Kada Lead' }
                ]
            }
        };

        async function checkCode() {
            const inputField = document.getElementById('flipcode');
            const authBtn = document.getElementById('auth-btn');
            const error = document.getElementById('error-msg');
            authBtn.innerText = "BYPASSING SECURITY...";
            
            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: inputField.value })
                });
                const result = await response.json();
                if (result.success) {
                    document.getElementById('gate').style.display = 'none';
                    document.getElementById('menu').classList.remove('hidden');
                } else { throw new Error(); }
            } catch (e) {
                authBtn.innerText = "INITIALIZE CONNECTION";
                error.classList.remove('opacity-0');
                setTimeout(() => error.classList.add('opacity-0'), 2000);
                inputField.value = '';
            }
        }

        async function showFlips(cat) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('vault').classList.remove('hidden');
            const container = document.getElementById('dashboard');
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-40 space-y-6">
                    <div class="w-16 h-16 rounded-full border-4 border-emerald-500/20 border-t-emerald-500 animate-spin"></div>
                    <p class="text-[10px] tracking-[1em] text-emerald-500 uppercase font-bold">Synchronizing Data</p>
                </div>`;

            try {
                const res = await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
                const data = await res.json();
                container.innerHTML = `
                    <div class="luxury-card p-12 mb-8 border-l-4 border-l-emerald-500">
                        <h3 class="text-emerald-500 font-bold uppercase tracking-[0.4em] text-[10px] mb-4">Strategic Brief</h3>
                        <p class="text-2xl font-light text-white/80 leading-relaxed">${flipData[cat].title}</p>
                    </div>`;

                const itemsGrid = document.createElement('div');
                itemsGrid.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8";
                
                flipData[cat].items.forEach(item => {
                    const product = data.products[item.id];
                    const stats = product?.quick_status;

                    if (stats) {
                        const spread = Math.floor(stats.buyPrice - stats.sellPrice);
                        const cleanId = item.id.split(':')[0];
                        
                        // Reliable Default Textures
                        const textureUrl = `https://sky.coflnet.com/static/items/${cleanId}.png`;

                        itemsGrid.innerHTML += `
                            <div class="luxury-card p-10 flex flex-col group animate-reveal">
                                <div class="relative mb-10 flex justify-center h-20">
                                    <div class="absolute inset-0 bg-emerald-500/10 blur-[40px] rounded-full scale-50 group-hover:scale-100 transition-all duration-700"></div>
                                    <img src="${textureUrl}" class="w-20 h-20 object-contain relative z-10 transition-all duration-500 group-hover:scale-125" 
                                         onerror="this.src='https://mc-heads.net/item/${cleanId.toLowerCase()}'">
                                </div>

                                <div class="text-center mb-10">
                                    <h2 class="text-xs font-bold uppercase tracking-widest text-white group-hover:text-emerald-400 transition-colors">${item.name}</h2>
                                    <p class="text-[9px] text-white/20 mt-2 tracking-tighter mono">${item.id}</p>
                                </div>

                                <div class="space-y-4 mb-10 border-y border-white/5 py-6">
                                    <div class="flex justify-between items-center text-[10px]">
                                        <span class="text-white/30 uppercase font-bold">Buy Price</span>
                                        <span class="mono text-white/90 font-bold text-sm">${Math.floor(stats.buyPrice).toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center text-[10px]">
                                        <span class="text-white/30 uppercase font-bold">Sell Price</span>
                                        <span class="mono text-white/90 font-bold text-sm">${Math.floor(stats.sellPrice).toLocaleString()}</span>
                                    </div>
                                </div>

                                <div class="mt-auto">
                                    <p class="text-[9px] text-emerald-500/60 font-bold uppercase mb-2">Net Profit Potential</p>
                                    <p class="text-3xl font-light tracking-tighter text-emerald-400 mono">
                                        +${spread.toLocaleString()}
                                    </p>
                                </div>
                            </div>`;
                    }
                });
                container.appendChild(itemsGrid);

            } catch (e) {
                container.innerHTML = '<div class="text-center py-20 text-rose-500 uppercase tracking-[0.8em] text-xs font-bold">Data Stream Offline</div>';
            }
        }

        function backToMenu() {
            document.getElementById('vault').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
        }
    </script>
</body>
</html>
