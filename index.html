<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>FLIPS | CREEPIAMOND</title>
    <style>
        :root { 
            --bg: #0f1113; /* Deep Titanium */
            --card-bg: rgba(30, 32, 35, 0.7);
            --accent: #10b981; 
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --silver: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(148, 163, 184, 0.05) 0%, transparent 50%),
                linear-gradient(to bottom, transparent, rgba(16, 185, 129, 0.02));
        }

        /* Square Luxury Card */
        .luxury-square {
            background: var(--card-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
        }

        .luxury-square:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.15), inset 0 0 15px rgba(16, 185, 129, 0.05);
            transform: translateY(-2px);
        }

        /* Neon Outline for Items */
        .neon-box {
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.05);
            aspect-ratio: 1/1;
        }
        
        .neon-box:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        /* Professional Input */
        .square-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            color: var(--accent);
            transition: all 0.3s ease;
            text-align: center;
        }

        .square-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
            background: rgba(16, 185, 129, 0.02);
        }

        /* Soft Animations */
        .reveal { 
            opacity: 0; 
            animation: softFadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
        }
        @keyframes softFadeIn { 
            from { opacity: 0; transform: translateY(10px); filter: blur(5px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Custom Scrollbar for Luxury Look */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="fixed top-8 w-full text-center z-50">
        <p class="text-[9px] tracking-[1.2em] uppercase text-slate-500 font-extrabold opacity-50">WHITE BLONDE TRACKER GO AHEAD PUT THE FUCKING PASSWORD</p>
    </div>

    <div id="gate" class="w-full max-w-sm reveal">
        <div class="luxury-square p-10 border-t-4 border-t-emerald-500/50">
            <div class="mb-8">
                <h1 class="text-xs font-bold tracking-[0.5em] text-center text-slate-400 uppercase mb-2">Goon Required</h1>
                <p class="text-[10px] text-slate-500 text-center font-medium">Please goon here with Mulirant for secured flips</p>
            </div>
            
            <div class="space-y-6">
                <input type="password" id="flipcode" maxlength="8" placeholder="GOON CODE" 
                       onkeydown="if(event.key==='Enter') checkCode()" 
                       class="square-input w-full py-4 text-sm font-bold tracking-[0.8em] placeholder:tracking-normal placeholder:text-slate-700">
                
                <button id="auth-btn" onclick="checkCode()" 
                        class="w-full py-4 bg-emerald-500/10 border border-emerald-500/20 text-emerald-500 text-[10px] font-bold tracking-[0.3em] uppercase hover:bg-emerald-500 hover:text-black transition-all duration-500">
                    Verify
                </button>
            </div>
            <p id="error-msg" class="text-rose-500 text-[9px] text-center mt-4 uppercase tracking-widest opacity-0 font-bold transition-opacity">Access Denied: Invalid Authorization</p>
        </div>
    </div>

    <div id="menu" class="hidden w-full max-w-5xl grid grid-cols-1 md:grid-cols-3 gap-8 reveal">
        <button onclick="showFlips('crafting')" class="luxury-square p-12 flex flex-col items-center gap-6 group overflow-hidden">
            <div class="absolute inset-0 bg-emerald-500/0 group-hover:bg-emerald-500/5 transition-all duration-700"></div>
            <div class="w-8 h-8 border border-emerald-500/20 flex items-center justify-center relative">
                <div class="absolute inset-0 border border-emerald-500 scale-0 group-hover:scale-100 transition-transform duration-500"></div>
                <div class="w-4 h-4 border-2 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin"></div>
            </div>
            <div class="text-center relative z-10">
                <span class="block text-xl font-extrabold tracking-tight text-slate-200 group-hover:text-white transition-colors">CRAFTING</span>
                <span class="text-[8px] text-emerald-500/40 font-bold tracking-[0.4em] uppercase">Buy order meterials fron bz</span>
            </div>
        </button>

        <button onclick="showFlips('combining')" class="luxury-square p-12 flex flex-col items-center gap-6 group overflow-hidden">
            <div class="absolute inset-0 bg-emerald-500/0 group-hover:bg-emerald-500/5 transition-all duration-700"></div>
            <div class="w-8 h-8 border border-emerald-500/20 flex items-center justify-center relative">
                <div class="absolute inset-0 border border-emerald-500 scale-0 group-hover:scale-100 transition-transform duration-500"></div>
                <svg class="w-4 h-4 text-emerald-500/40 group-hover:text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <div class="text-center relative z-10">
                <span class="block text-xl font-extrabold tracking-tight text-slate-200 group-hover:text-white transition-colors">COMBINING</span>
                <span class="text-[8px] text-emerald-500/40 font-bold tracking-[0.4em] uppercase">Combine T1 > T5 Books</span>
            </div>
        </button>

        <button onclick="showFlips('bz')" class="luxury-square p-12 flex flex-col items-center gap-6 group overflow-hidden">
            <div class="absolute inset-0 bg-emerald-500/0 group-hover:bg-emerald-500/5 transition-all duration-700"></div>
            <div class="w-8 h-8 border border-emerald-500/20 flex items-center justify-center relative">
                <div class="absolute inset-0 border border-emerald-500 scale-0 group-hover:scale-100 transition-transform duration-500"></div>
                <svg class="w-4 h-4 text-emerald-500/40 group-hover:text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            </div>
            <div class="text-center relative z-10">
                <span class="block text-xl font-extrabold tracking-tight text-slate-200 group-hover:text-white transition-colors">BAZAAR</span>
                <span class="text-[8px] text-emerald-500/40 font-bold tracking-[0.4em] uppercase">Buy/Sell</span>
            </div>
        </button>
    </div>

    <div id="interface" class="hidden w-full max-w-[90rem] reveal">
        <div class="flex justify-between items-center mb-10">
            <button onclick="backToMenu()" class="text-[10px] font-bold tracking-[0.2em] text-slate-500 hover:text-emerald-400 transition-all flex items-center gap-4">
                <span class="p-2 border border-slate-800 group-hover:border-emerald-500">RETURN TO HUB</span>
            </button>
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">LIVE MARKET STREAM</span>
            </div>
        </div>
        <div id="dashboard" class="grid grid-cols-1 gap-8"></div>
    </div>

    <script>
        const flipData = {
            crafting: {
                title: "No craft flips available right now. Try the Quick Bite 1 craft flip: type /recipe quick bite in game chat.",
                items: [{ id: 'ENCHANTED_BOOK:QUICK_BITE:1', name: 'Quick Bite 1' }]
            },
            combining: {
                title: "Market Strategy: Mass-buy T1 books. Synthesize into T5 variants. Liquidate for high-margin gains.",
                items: [{ id: 'ENCHANTMENT_CHARM_1', name: 'Charm 1' },
                        { id: 'ENCHANTMENT_PROSPERITY_1', name: 'Prosperity 1' },
                        { id: 'ENCHANTMENT_LAPIDARITY_1', name: 'Lapidarity 1' }]
            },
            bz: {
                title: "Operational Status: Scanning real-time spreads for high-velocity Bazaar assets.",
                items: [
                    { id: 'ENCHANTED_RAW_RABBIT', name: 'Enchanted Raw Rabbit' }, { id: 'HALF_EATEN_MUSHROOM', name: 'Half-eaten mushroom' },
                    { id: 'FINE_FLOUR', name: 'Fine flour' }, { id: 'ENCHANTED_PORK', name: 'Enchanted Raw Pork' },
                    { id: 'TUNGSTEN_KEY', name: 'Tungsten Key' }, { id: 'UMBER_KEY', name: 'Umber Key' },
                    { id: 'ENCHANTMENT_THUNDERBOLT_7', name: 'Thunderbolt 7' }, { id: 'ENCHANTMENT_THUNDERLORD_7', name: 'Thunderlord 7' },
                    { id: 'ENCHANTMENT_FIRE_PROTECTION_7', name: 'Fire Protection 7' }, { id: 'BUSTED_BELT_BUCKLE', name: 'Busted Belt Buckle' },
                    { id: 'RUSTY_COIN', name: 'Rusty Coin' }, { id: 'HOTSPOT_BAIT', name: 'Hotspot Bait' },
                    { id: 'ENCHANTED_TUNGSTEN', name: 'Enchanted Tungsten' }, { id: 'ENCHANTED_UMBER', name: 'Enchanted Umber' },
                    { id: 'KADA_LEAD', name: 'Kada Lead' }
                ]
            }
        };

        async function checkCode() {
            const inputField = document.getElementById('flipcode');
            const authBtn = document.getElementById('auth-btn');
            const error = document.getElementById('error-msg');
            authBtn.innerText = "CHECKING DATABASE...";
            
            try {
                const response = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: inputField.value })
                });
                const result = await response.json();
                if (result.success) {
                    document.getElementById('gate').classList.add('hidden');
                    document.getElementById('menu').classList.remove('hidden');
                } else { throw new Error(); }
            } catch (e) {
                authBtn.innerText = "GOON";
                error.classList.remove('opacity-0');
                setTimeout(() => error.classList.add('opacity-0'), 2000);
                inputField.value = '';
            }
        }

        async function showFlips(cat) {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('interface').classList.remove('hidden');
            const container = document.getElementById('dashboard');
            
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-40 gap-6">
                    <div class="w-12 h-12 border border-emerald-500/20 border-t-emerald-500 rounded-none animate-spin"></div>
                    <p class="text-[10px] tracking-[0.8em] text-emerald-500 uppercase font-bold">Fetching Market Data</p>
                </div>`;

            try {
                const res = await fetch('https://api.hypixel.net/v2/skyblock/bazaar');
                const data = await res.json();
                
                container.innerHTML = `
                    <div class="luxury-square p-8 border-l-4 border-l-emerald-500">
                        <p class="text-xs font-bold text-emerald-500 uppercase tracking-widest mb-3">Strategy Note</p>
                        <p class="text-xl font-light text-slate-300 leading-relaxed">${flipData[cat].title}</p>
                    </div>`;

                const itemsGrid = document.createElement('div');
                itemsGrid.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6";
                
                flipData[cat].items.forEach(item => {
                    const product = data.products[item.id];
                    const stats = product?.quick_status;

                    if (stats) {
                        const spread = Math.floor(stats.buyPrice - stats.sellPrice);
                        // Fix for Enchanted Book and other specific item textures
                        let textureId = item.id;
                        if(textureId.includes("ENCHANTED_BOOK")) textureId = "ENCHANTED_BOOK";
                        
                        const textureUrl = `https://sky.shiiyu.moe/item/${item.id}`;

                        itemsGrid.innerHTML += `
                            <div class="luxury-square neon-box p-6 flex flex-col group reveal">
                                <div class="flex justify-center mb-8 relative">
                                    <div class="absolute inset-0 bg-emerald-500/5 blur-3xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                    <img src="${textureUrl}" class="w-16 h-16 object-contain relative z-10 transition-all duration-700 group-hover:scale-110 group-hover:rotate-3" 
                                         onerror="this.src='https://mc-heads.net/item/${textureId}'">
                                </div>

                                <div class="text-center mb-6">
                                    <h2 class="text-xs font-bold uppercase tracking-wide text-slate-100 group-hover:text-emerald-400 transition-colors">${item.name}</h2>
                                    <p class="text-[8px] text-slate-600 mt-1 mono font-bold">${item.id}</p>
                                </div>

                                <div class="space-y-3 mb-6 border-y border-white/5 py-4">
                                    <div class="flex justify-between items-center text-[10px]">
                                        <span class="text-slate-500 font-bold uppercase">Buy</span>
                                        <span class="mono text-white">${Math.floor(stats.buyPrice).toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center text-[10px]">
                                        <span class="text-slate-500 font-bold uppercase">Sell</span>
                                        <span class="mono text-white">${Math.floor(stats.sellPrice).toLocaleString()}</span>
                                    </div>
                                    <div class="flex justify-between items-center text-[9px] pt-1 opacity-50">
                                        <span class="text-slate-500 font-bold uppercase">Volume</span>
                                        <span class="mono">${Math.round(stats.buyVolume/1000)}k / ${Math.round(stats.sellVolume/1000)}k</span>
                                    </div>
                                </div>

                                <div class="mt-auto">
                                    <p class="text-[8px] text-emerald-500/40 font-extrabold uppercase mb-1">Net Gain</p>
                                    <p class="text-2xl font-bold tracking-tighter text-emerald-500 mono">
                                        +${spread.toLocaleString()}
                                    </p>
                                </div>
                            </div>`;
                    }
                });
                container.appendChild(itemsGrid);

            } catch (e) {
                container.innerHTML = '<div class="text-center py-20 text-rose-500 uppercase tracking-widest text-[10px] font-bold">Connection Terminated: Stream Offline</div>';
            }
        }

        function backToMenu() {
            document.getElementById('interface').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
        }
    </script>
</body>
</html>
